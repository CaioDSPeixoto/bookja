<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Offline · Bookja</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f4f6;
      color: #111827;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }
    .cartao {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border: 1px solid #f3f4f6;
      border-radius: 16px;
      box-shadow: 0 10px 25px -12px rgba(79, 70, 229, 0.25);
      padding: 32px 24px;
      text-align: center;
    }
    .icone {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; color: #6b7280; margin: 0 0 20px; line-height: 1.5; }
    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 0;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <main class="cartao">
    <div class="icone" aria-hidden="true">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
      </svg>
    </div>
    <h1>Você está offline</h1>
    <p>Não foi possível carregar esta página. Verifique sua conexão — o que você já leu continua disponível.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </main>
</body>
</html>
